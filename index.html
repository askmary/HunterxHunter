<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <section class="header-container">
            <figure class="fig-logo">
                <img class="logo" src="img/logo.png" alt="Logo Hunter x Hunter">
            </figure>
            <nav>
                <ul>
                    <li>Home</li>
                    <li>About</li>
                    <li>Contact</li>
                </ul>
            </nav>
        </section>
    </header>
    <main>
        <section class="card-section">
            <div>
                <figure>
                    <img class="card" src="img/Gon.jpg" alt="Gon Freecss">
                </figure>
                <figure>
                    <img class="card" src="img/Gon2.jpg" alt="Gon Freecss">
                </figure>
            </div>
            <div>
                <figure>
                    <img class="card" src="img/Gon3.jpg" alt="Gon Freecss">
                </figure>
                <figure>
                    <img class="card" src="img/Gon4.jpg" alt="Gon Freecss">
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <figure>
            <img src="" alt="">
        </figure>
        <figure>
            <img src="" alt="">
        </figure>
        <figure>
            <img src="" alt="">
        </figure>
    </footer>
</body>
</html>
